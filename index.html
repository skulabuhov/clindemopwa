<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Clinic PWA Demo</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta http-equiv="Content-Security-Policy" content="connect-src http: https: ws: blob:;">
</head>
<body>
<div class="container">
    <div id="login">
        <h1>Вход</h1>
        <form id="loginForm">
            <input type="text" id="loginUser" placeholder="Логин" required>
            <input type="password" id="loginPass" placeholder="Пароль" required>
            <button id="loginBtn" type="submit" class="primary">Войти</button>
        </form>
    </div>
    <div id="app" class="hidden">
        <header>
            <span id="username"></span>
            <button id="logoutBtn" class="secondary">Выход</button>
        </header>
        <div id="menu">
            <button id="createBtn" class="primary">Новый прием</button>
        </div>
        <div id="appointments"></div>
        <div id="appointment" class="hidden">
            <div id="navRow">
                <button id="backBtn" class="secondary">Назад</button>
                <button id="reportBtn" class="primary">Отчет</button>
            </div>
            <button id="finishBtn" class="secondary hidden">Завершить прием</button>
            <h2 id="appointmentTitle"></h2>
            <div id="controls" class="hidden">
                <button id="recordBtn" class="primary record-btn">Запись</button>
            </div>
            <ul id="recordings"></ul>
        </div>
    </div>
</div>
    <div id="loader" class="hidden">Загрузка...</div>
    <div id="reportDialog" class="dialog hidden">
        <div class="dialog-content">
            <p>Выберите тип отчета</p>
            <button id="reportMainBtn" class="primary">Общий отчет</button>
            <button id="reportAnamnesisBtn" class="primary">Анамнез</button>
        </div>
    </div>
    <div id="reportReadyDialog" class="dialog hidden">
        <div class="dialog-content">
            <p>Отчет готов</p>
            <a id="reportDownloadLink" href="#" target="_blank">Скачать</a>
        </div>
    </div>
    <script src="assets/main.js"></script>
</body>
</html>
