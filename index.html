<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic PWA Demo</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="manifest" href="manifest.json">
    <meta http-equiv="Content-Security-Policy" content="connect-src http: https: ws: blob:;">
</head>
<body>
<div class="container">
    <div id="login">
        <h1>Вход</h1>
        <form id="loginForm">
            <input type="text" id="loginUser" placeholder="Логин" required>
            <input type="password" id="loginPass" placeholder="Пароль" required>
            <button id="loginBtn" type="submit" class="primary">Войти</button>
        </form>
    </div>
    <div id="session" class="hidden">
        <button id="startBtn" class="primary">Начать прием</button>
        <div id="controls" class="hidden">
            <button id="recordBtn" class="primary">Запись</button>
            <button id="finishBtn" class="secondary">Закончить прием</button>
            <ul id="recordings"></ul>
        </div>
    </div>
</div>
<script src="assets/main.js"></script>
</body>
</html>
